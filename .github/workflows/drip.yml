name: Argentina Authority Drip
on:
  schedule:
    - cron: '0 */3 * * *' 
  workflow_dispatch: 

jobs:
  run-migration:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Tools
        run: pip install flickrapi google-genai requests requests-oauthlib

      - name: Execute Drip
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SMUGMUG_API_KEY: ${{ secrets.SMUGMUG_API_KEY }}
          SMUGMUG_API_SECRET: ${{ secrets.SMUGMUG_API_SECRET }}
          SMUGMUG_ACCESS_TOKEN: ${{ secrets.SMUGMUG_ACCESS_TOKEN }}
          SMUGMUG_ACCESS_TOKEN_SECRET: ${{ secrets.SMUGMUG_ACCESS_TOKEN_SECRET }}
          FLICKR_API_KEY: ${{ secrets.FLICKR_API_KEY }}
          FLICKR_API_SECRET: ${{ secrets.FLICKR_API_SECRET }}
          FLICKR_ACCESS_TOKEN: ${{ secrets.FLICKR_ACCESS_TOKEN }}
          FLICKR_ACCESS_SECRET: ${{ secrets.FLICKR_ACCESS_SECRET }}
        # This ensures the Save step runs even if the Python script hits a Gemini error
        continue-on-error: true
        run: python migrate_argentina_drip.py

      - name: Save Migration History
        if: always() 
        run: |
          git config --global user.name "Project 23 Bot"
          git config --global user.email "bot@samuelandaudrey.com"
          
          # Force sync to ensure the bot sees your manual website edits
          git fetch origin main
          git checkout main
          
          # 1. Stage and Stash the bot's new IDs and the new sidecars
          git add migration_history.json
          git add metadata_sidecars/ || true
          git stash
          
          # 2. Pull your latest manual edits (San Telmo keys, etc.)
          git pull origin main --rebase
          
          # 3. Pop the IDs and sidecars back in. If there is a conflict, 'theirs' (the bot's work) wins.
          git stash pop || { git checkout --theirs migration_history.json; git checkout --theirs metadata_sidecars/ || true; }
          
          # 4. Final Stage and Push
          git add migration_history.json
          git add metadata_sidecars/ || true
          
          if git diff --staged --quiet; then
            echo "No new history to save."
          else
            git commit -m "Update Project 23 migration history and sidecars [skip ci]"
            git push origin main
          fi
